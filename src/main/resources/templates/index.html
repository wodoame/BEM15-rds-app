<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Todo App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
      body { background-color: #f0f2f5; }

      .column-title { font-weight: 700; color: #495057; letter-spacing: 0.5px; }
      .column-count { font-weight: 600; }

      .btn-add {
        width: 48px; height: 48px; border-radius: 50%;
        display: inline-flex; align-items: center; justify-content: center;
        font-size: 1.6rem; line-height: 1; padding: 0;
        color: #212529; background-color: transparent; border: none;
        transition: background-color 0.15s;
      }
      .btn-add:hover, .btn-add:focus { color: #212529; background-color: #cfe0ff; }

      .todo-card { border-radius: 12px; transition: box-shadow 0.15s; }
      .todo-card:hover { box-shadow: 0 .5rem 1rem rgba(0,0,0,.1) !important; }
      .todo-card:hover .todo-actions { opacity: 1; }

      .form-check-input { width: 1.2em; height: 1.2em; cursor: pointer; flex-shrink: 0; margin-top: 0.15rem; }
      .form-check-input:checked { background-color: #6c757d; border-color: #6c757d; }

      .todo-title { font-size: 1rem; font-weight: 600; word-break: break-word; }
      .todo-title.completed { text-decoration: line-through; color: #adb5bd; }
      .todo-desc { font-size: 0.875rem; color: #6c757d; white-space: pre-wrap; word-break: break-word; }
      .todo-desc.completed { color: #ced4da; }

      .todo-actions { opacity: 0; transition: opacity 0.15s; }
      .btn-icon { border: none; background: none; line-height: 1; padding: 4px; font-size: 1rem; display: inline-flex; align-items: center; justify-content: center; }
      .btn-edit { color: #6c757d; }
      .btn-edit:hover { color: #b83b3b; }
      .btn-delete { color: #dc3545; }
      .btn-delete:hover { color: #a71d2a; }

      .empty-hint { font-size: 0.875rem; color: #adb5bd; }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-10 col-xl-9">

          <h1 class="text-center fw-bold mb-4" style="letter-spacing: -1px; font-size: 3rem;">My Todos v2</h1>

          <!-- Add row -->
          <div class="d-flex justify-content-start mb-4">
            <button type="button" class="btn btn-add" data-bs-toggle="modal" data-bs-target="#addModal" title="Add todo" aria-label="Add todo">+</button>
          </div>

          <!-- Two columns -->
          <div class="row g-4">

            <!-- To do -->
            <div class="col-12 col-md-6">
              <div class="d-flex align-items-center gap-2 mb-3">
                <h5 class="column-title mb-0">To do</h5>
                <span class="badge bg-secondary column-count" th:text="${#lists.size(active)}">0</span>
              </div>
              <div class="d-flex flex-column gap-3">
                <div th:each="todo : ${active}" class="card todo-card border-0 shadow-sm">
                  <div class="card-body d-flex gap-3">
                    <form th:action="@{/todos/{id}/toggle(id=${todo.id})}" method="post" class="m-0">
                      <input class="form-check-input" type="checkbox" th:checked="${todo.completed}" onchange="this.form.submit()" title="Mark complete">
                    </form>
                    <div class="flex-grow-1">
                      <div class="todo-title" th:text="${todo.title}">Title</div>
                      <div class="todo-desc mt-1" th:if="${todo.description != null}" th:text="${todo.description}">Description</div>
                    </div>
                    <div class="todo-actions d-flex align-items-center gap-1">
                      <button type="button" class="btn-icon btn-edit" title="Edit" onclick="openEdit(this)"
                              th:attr="data-id=${todo.id},data-title=${todo.title},data-description=${todo.description}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"/></svg>
                      </button>
                      <form th:action="@{/todos/{id}/delete(id=${todo.id})}" method="post" class="m-0">
                        <button type="submit" class="btn-icon btn-delete" title="Delete">
                          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                      </form>
                    </div>
                  </div>
                </div>
                <p class="empty-hint mb-0" th:if="${#lists.isEmpty(active)}">Nothing to do — add one above.</p>
              </div>
            </div>

            <!-- Completed -->
            <div class="col-12 col-md-6">
              <div class="d-flex align-items-center gap-2 mb-3">
                <h5 class="column-title mb-0">Completed</h5>
                <span class="badge bg-secondary column-count" th:text="${#lists.size(completed)}">0</span>
              </div>
              <div class="d-flex flex-column gap-3">
                <div th:each="todo : ${completed}" class="card todo-card border-0 shadow-sm">
                  <div class="card-body d-flex gap-3">
                    <form th:action="@{/todos/{id}/toggle(id=${todo.id})}" method="post" class="m-0">
                      <input class="form-check-input" type="checkbox" th:checked="${todo.completed}" onchange="this.form.submit()" title="Mark active">
                    </form>
                    <div class="flex-grow-1">
                      <div class="todo-title completed" th:text="${todo.title}">Title</div>
                      <div class="todo-desc completed mt-1" th:if="${todo.description != null}" th:text="${todo.description}">Description</div>
                    </div>
                    <div class="todo-actions d-flex align-items-center gap-1">
                      <button type="button" class="btn-icon btn-edit" title="Edit" onclick="openEdit(this)"
                              th:attr="data-id=${todo.id},data-title=${todo.title},data-description=${todo.description}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"/></svg>
                      </button>
                      <form th:action="@{/todos/{id}/delete(id=${todo.id})}" method="post" class="m-0">
                        <button type="submit" class="btn-icon btn-delete" title="Delete">
                          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                      </form>
                    </div>
                  </div>
                </div>
                <p class="empty-hint mb-0" th:if="${#lists.isEmpty(completed)}">No completed todos yet.</p>
              </div>
            </div>

          </div>

        </div>
      </div>
    </div>

    <!-- Add modal -->
    <div class="modal fade" id="addModal" tabindex="-1" aria-labelledby="addModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
          <form th:action="@{/todos}" method="post">
            <div class="modal-header">
              <h5 class="modal-title" id="addModalLabel">New todo</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <input type="text" name="title" class="form-control mb-3" placeholder="Title" autocomplete="off" required autofocus>
              <textarea name="description" class="form-control" placeholder="Description (optional)" rows="3"></textarea>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-primary px-4">Add</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Edit modal -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
          <form id="editForm" method="post">
            <div class="modal-header">
              <h5 class="modal-title" id="editModalLabel">Edit todo</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <input type="text" id="editTitle" name="title" class="form-control mb-3" placeholder="Title" autocomplete="off" required>
              <textarea id="editDescription" name="description" class="form-control" placeholder="Description (optional)" rows="3"></textarea>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-primary px-4">Save</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
      const editModal = new bootstrap.Modal(document.getElementById('editModal'));

      function openEdit(btn) {
        document.getElementById('editForm').action = '/todos/' + btn.getAttribute('data-id') + '/edit';
        document.getElementById('editTitle').value = btn.getAttribute('data-title') || '';
        document.getElementById('editDescription').value = btn.getAttribute('data-description') || '';
        editModal.show();
      }
    </script>
  </body>
</html>
