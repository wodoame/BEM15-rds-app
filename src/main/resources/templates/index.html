<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Todo App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
      body { background-color: #f0f2f5; }

      .todo-card { border-radius: 12px; overflow: hidden; }

      .todo-input { font-size: 1.1rem; }
      .todo-input:focus { box-shadow: none; }

      .todo-item { transition: background-color 0.15s; }
      .todo-item:hover { background-color: #f8f9fa; }
      .todo-item:hover .btn-delete { opacity: 1; }

      .form-check-input { width: 1.2em; height: 1.2em; cursor: pointer; flex-shrink: 0; }
      .form-check-input:checked { background-color: #6c757d; border-color: #6c757d; }

      .todo-text { font-size: 1rem; }
      .todo-text.completed { text-decoration: line-through; color: #adb5bd; }

      .btn-delete { opacity: 0; transition: opacity 0.15s; color: #dc3545; border: none; background: none; font-size: 1rem; line-height: 1; padding: 2px 6px; }
      .btn-delete:hover { color: #a71d2a; }

      .btn-edit { opacity: 0; transition: opacity 0.15s; color: #6c757d; border: none; background: none; font-size: 1rem; line-height: 1; padding: 2px 6px; }
      .btn-edit:hover { color: #b83b3b; }
      .todo-item:hover .btn-edit { opacity: 1; }

      .todo-edit-input { font-size: 1rem; }
      .todo-edit-input:focus { box-shadow: none; }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-7 col-lg-6">

          <h1 class="text-center fw-bold mb-4" style="color: #b83b3b; letter-spacing: -1px; font-size: 3rem;">todos</h1>

          <div class="card shadow todo-card border-0">

            <!-- Add todo -->
            <form class="d-flex border-bottom" th:action="@{/todos}" method="post">
              <input type="text" name="title" class="form-control border-0 shadow-none py-3 px-4 todo-input" placeholder="What needs to be done?" autocomplete="off" required>
              <button type="submit" class="btn btn-primary px-4 rounded-0">Add</button>
            </form>

            <!-- Todo list -->
            <ul class="list-group list-group-flush" id="todo-list">

              <li th:each="todo : ${todos}" class="list-group-item d-flex align-items-center gap-3 px-4 py-3 todo-item">
                <form th:action="@{/todos/{id}/toggle(id=${todo.id})}" method="post" class="d-flex">
                  <input class="form-check-input" type="checkbox" th:checked="${todo.completed}" onchange="this.form.submit()">
                </form>
                <span class="todo-text flex-grow-1" th:classappend="${todo.completed} ? 'completed'" th:text="${todo.title}"></span>
                <form th:action="@{/todos/{id}/edit(id=${todo.id})}" method="post" class="todo-edit-form flex-grow-1 d-none">
                  <input type="text" name="title" th:value="${todo.title}" class="form-control border-0 shadow-none p-0 todo-edit-input" autocomplete="off" required
                         onkeydown="if (event.key === 'Escape') cancelEdit(this);">
                </form>
                <button type="button" class="btn-edit" title="Edit" onclick="startEdit(this)">✎</button>
                <form th:action="@{/todos/{id}/delete(id=${todo.id})}" method="post">
                  <button type="submit" class="btn-delete" title="Delete">✕</button>
                </form>
              </li>

            </ul>

            <!-- Footer -->
            <div class="d-flex align-items-center justify-content-between px-4 py-2 border-top bg-white">
              <small class="text-muted">2 items left</small>
              <div class="btn-group btn-group-sm">
                <a href="?filter=all"       class="btn btn-outline-secondary active">All</a>
                <a href="?filter=active"    class="btn btn-outline-secondary">Active</a>
                <a href="?filter=completed" class="btn btn-outline-secondary">Completed</a>
              </div>
              <form th:action="@{/todos/completed}" method="post">
                <input type="hidden" name="_method" value="delete">
                <button type="submit" class="btn btn-sm btn-link text-muted p-0 text-decoration-none">Clear completed</button>
              </form>
            </div>

          </div>

        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
      function startEdit(btn) {
        const item = btn.closest('.todo-item');
        item.querySelector('.todo-text').classList.add('d-none');
        item.querySelector('.btn-edit').classList.add('d-none');
        const form = item.querySelector('.todo-edit-form');
        form.classList.remove('d-none');
        const input = form.querySelector('input[name=title]');
        input.focus();
        input.setSelectionRange(input.value.length, input.value.length);
      }

      function cancelEdit(input) {
        const item = input.closest('.todo-item');
        input.value = input.defaultValue;
        item.querySelector('.todo-edit-form').classList.add('d-none');
        item.querySelector('.todo-text').classList.remove('d-none');
        item.querySelector('.btn-edit').classList.remove('d-none');
      }
    </script>
  </body>
</html>
