# Development profile — plain PostgreSQL + Redis with password auth.
# Bypasses RdsIamDataSourceConfig (which is @Profile("!dev")) so no AWS/RDS IAM is needed.
#
# Run locally against docker-compose:
#   docker compose up -d db redis
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
#
# Defaults target the docker-compose db/redis on localhost; each value can be
# overridden by an env var (so the same profile also works inside compose).

server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tododb}
spring.datasource.username=${DB_USERNAME:todouser}
spring.datasource.password=${DB_PASSWORD:todopass}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
